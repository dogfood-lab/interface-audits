name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: schemas + links + shipcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: JSON Schema validation
        run: node scripts/verify-schemas.mjs

      - name: Markdown relative-link check
        run: node scripts/verify-links.mjs

      - name: Shipcheck audit (hard gates A–D)
        run: npx -y @mcptoolshop/shipcheck audit

  audit-self:
    name: cognitive-load self-audit reminder
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Reminder
        run: |
          echo "Reminder: this repo's README + landing page should themselves obey"
          echo "the cognitive-load audit it documents. Run the audit on the handbook"
          echo "before declaring a new release whole."
